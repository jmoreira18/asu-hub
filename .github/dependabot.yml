# Actualizaciones de dependencias automáticas (gratis, nativo de GitHub).
# Agrupadas para no inundar de PRs. Alertas de seguridad llegan aparte.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
