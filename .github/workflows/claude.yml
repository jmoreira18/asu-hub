name: Claude Code

# Dos modos, un solo archivo:
#  1) review   → review automático al abrir/actualizar un PR (sin pedir nada).
#  2) assistant→ asistente interactivo cuando alguien menciona @claude en un
#                comentario, review o issue.
# Requiere el secret ANTHROPIC_API_KEY y la GitHub App de Claude instalada.
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # ── Review automático de PRs ────────────────────────────────────────────
  # Solo PRs del propio repo: en repos públicos, los PR desde forks NO reciben
  # secrets (ANTHROPIC_API_KEY vendría vacío) ni token de escritura. Gateamos
  # para no gastar runs ni dejar fallos confusos.
  review:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Revisá este PR como reviewer senior. Enfocate en: correctitud,
            seguridad/privacidad (datos sensibles, SUPABASE_SERVICE_KEY solo
            server-side), y que NO se rompan las reglas de arquitectura de
            CLAUDE.md (src/core puro, pago confirmado por webhook). Dejá
            comentarios inline en las líneas relevantes. Si está todo bien,
            decilo en un comentario corto. No hagas cambios al código.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  # ── Asistente @claude (mención) ─────────────────────────────────────────
  # Corre solo si el texto menciona @claude y quien lo escribe es OWNER o
  # COLLABORATOR (repo público: sin este gate cualquiera gastaría tu API key).
  assistant:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
