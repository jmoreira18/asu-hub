name: PR — lint, types, unit + integration

# Rápido en cada PR. Sin Allure (eso se reserva para E2E en release).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Vitest corre unit + integration y aplica el gate de 100% sobre src/core.
      - run: npm run test:cov
