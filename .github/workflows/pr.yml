name: PR — lint, types, unit + integration

# Rápido en cada PR. Sin Allure (eso se reserva para E2E en release).
# Todos los steps son bloqueantes y deterministas: dependen solo del diff +
# package-lock, no de estado externo que cambie con el tiempo. El `npm audit`
# (que depende de advisories publicados upstream y puede romper un PR sin
# relación) vive en security.yml como job programado, no acá.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      # Código y dependencias muertas.
      - run: npm run knip
      # Vitest corre unit + integration y aplica el gate de 100% sobre src/core.
      - run: npm run test:cov

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
