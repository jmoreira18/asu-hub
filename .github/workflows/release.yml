name: Release — E2E funcionales + Allure → Pages

# Solo en tags de versión (nuevas versiones), no en cada PR.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright levanta el server (build + start) según playwright.config.ts.
      - run: npm run test:e2e
      - name: Generar reporte Allure
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - name: Subir artefacto de Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  publish:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
