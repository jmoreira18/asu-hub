name: Release — E2E funcionales + Allure → Pages

# Solo en tags de versión (nuevas versiones), no en cada PR.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright levanta el server (build + start) según playwright.config.ts.
      - run: npm run test:e2e
      - name: Generar reporte Allure
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - name: Subir artefacto de Pages
        if: always()
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: allure-report

  publish:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
