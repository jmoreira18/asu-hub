name: Semgrep — SAST (OSS)

# Semgrep en modo OSS: reglas comunitarias, sin cuenta ni upload externo.
# Bloquea el PR si encuentra findings (exit code != 0).
# Corre en TODOS los PRs (no solo los que apuntan a main): el SAST es un gate
# por PR, igual que pr.yml. Imagen pineada por versión para reproducibilidad;
# los rulesets p/* se resuelven del registry y pueden cambiar upstream (costo
# inherente del SAST gestionado).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    name: scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.166.0
    # Sin SEMGREP_APP_TOKEN → modo OSS local, no sube nada.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: >-
          semgrep ci
          --config p/default
          --config p/typescript
          --config p/react
          --config p/nextjs
          --config p/owasp-top-ten
          --config p/secrets
